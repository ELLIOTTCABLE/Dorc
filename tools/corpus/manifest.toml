# Dorc corpus acquisition manifest
#
# PURPOSE. Pins every candidate corpus source for DETERMINISTIC re-acquisition.
# The data itself is NEVER committed — it lives out-of-tree in a cache; only this
# manifest (the reproducibility record) is in-tree. `acquire` (network, gated,
# resumable) is kept separate from `analyze` (offline, pure, re-runnable).
#
# CACHE (out-of-tree, per-platform):  ${XDG_CACHE_HOME:-~/.cache}/dorc-research/
#   This machine (MINGW64): C:\Users\ec\.cache\dorc-research
#   NOTE the Windows/WSL division: ~/.cache resolves to different roots Win vs WSL,
#   and node_modules / mise installs are per-side. Each platform re-acquires its own
#   copy from this manifest; nothing here assumes a shared cache.
#
# CONTRAST-NOT-COMPOUND (charter §3, load-bearing): these are public, world-
# representative corpora — deliberately NOT the user's own scripts (which already
# encode Dorc's design biases). No ~/System ansible, no user GitHub contribs.
#
# FOOTPRINT (AGENTS.md): keep total under ~50 GB. PIPr's 197.5 GB is EXCLUDED.
#
# STATUS values: planned | sampled | acquired | excluded
# Checksums verified against the source landing page on 2026-06-01 unless noted.

schema_version = 1
acquired_date  = "2026-06-01"   # set when first fetched; passed in, not Date.now()

# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE-1 — shell corpora (parse-feasibility + apply-cost×check-depth banding)
# ─────────────────────────────────────────────────────────────────────────────

[[source]]
id          = "bash-in-the-wild"
purpose     = 1
status      = "planned"
kind        = "archive"
desc        = "1,352,768 distinct GitHub bash scripts (general) + 14,387 from top-1k repos. Deduped. The TOSEM-2022 study population; note-30 digested its feature/oracle priors."
url         = "https://zenodo.org/records/5732299/files/bash_data.tar.gz"
doi         = "10.5281/zenodo.5732299"
size        = "13.9 GB (14.5 GB record total)"
md5         = "8c4b6f6ed007211f3020a322cc03c5fd"   # bash_data.tar.gz
license     = "Other (Attribution) — Zenodo; per-script upstream licenses unknown (do not redistribute a derived corpus)"
caveat      = "Population is ALL github bash, broader than 'ops/provisioning shell'. Use as the general-shell baseline; sub-filter provisioning-flavored where relevant."

[[source]]
id          = "homelab-gitops"
purpose     = 1   # also serves purpose-2 (mixed trees) and Q-FUZZYEDGE
status      = "planned"
kind        = "github-sample"
desc        = "Homelab/gitops trees (provisioning shell + Ansible + Terraform + the fuzzy-edge signatures). The realistic ops demographic per DESIGN."
query       = "gh search repos --topic k8s-at-home --topic home-ops --topic homelab --sort stars"
sample_plan = "stratified by stars × domain; shallow clone (--depth 1); pin each repo@SHA into resolved.lock at fetch time; content-hash dedup (onedr0p/cluster-template lineage clones heavily)"
size        = "~2-5 GB (shallow, ~50-100 repos)"
license     = "per-repo; filter to permissive (MIT/Apache/BSD) for any redistributable derivative; record SPDX per repo at fetch"

# Deferred Purpose-1: Debian maintainer-scripts (CoLiS corpus) — fiddly on Windows
# (no apt), and bash-in-the-wild + homelab cover the need. Reserve, don't fetch now.

# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE-2 — Ansible/IaC corpora (workload-shape + oracle-demand)
# ─────────────────────────────────────────────────────────────────────────────

