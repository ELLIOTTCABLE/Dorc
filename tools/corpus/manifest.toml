[[source]]
id          = "ansible-galaxy"
purpose     = 2
status      = "planned"
kind        = "github-sample"
desc        = "Top Ansible Galaxy collections by download_count → clone the backing repos for raw .yml. The Q-OPDIST / Q-CHECKPAT / Q-THINWRAP workhorse (real provider work)."
