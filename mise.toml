# Toolchain pin for Dorc tooling.
#
# Win/WSL note: this file is read by BOTH your Windows-side and WSL-side mise
# (it's in the synced tree), but installs are per-platform — run `mise install`
# on each side. The corpus instrument's npm deps are pure-JS/wasm (no native
# bindings), so the committed package-lock survives that division.
#
# node is LTS (the kept corpus instrument lives under tools/corpus/). The wasm
# scanner stack is node-version-agnostic; verified on 25, pinned to 22 LTS.

[tools]
node = "22"

# clone-vendor.sh deps
gh = "2"
jq = "1"

# Pre-commit `cargo fmt` for the Rust spike under spike/ (see ./hk.pkl).
# `pkl` is hk's config backend; both are pinned here so the hook is
# reproducible rather than relying on a machine-global mise install.
#
# NOTE: the git hook is deliberately NOT auto-installed. This worktree's
# `.git` shares the MAIN repo's gitdir, so `hk install` would write the
# `hook.*` entry into the SHARED `.git/config` (affecting `main` and every
# worktree). Install is a manual, human-gated step — see the round-19 spike
# note. Run `mise run hk-install` only with that tradeoff understood.
hk = "1.44.3"
pkl = "0.31.1"

# Lint/audit toolbelt for the spike (wired as hk.pkl steps; see also
# `mise run audit` for the network-touching advisories pass).
"cargo:cargo-deny" = "latest"
typos = "latest"

[env]
# Route hk's hook invocation + step commands through mise (so `cargo`/`hk`
# resolve without an activated shell). Matches `mise x` usage in hk.pkl.
HK_MISE = "1"

[tasks.hk-install]
description = "Install the hk pre-commit hook. WRITES SHARED .git/config (affects main) — human-gated; read the round-19 spike note first."
run = "hk install"

[tasks.fmt]
description = "Apply cargo fmt to the spike via hk (formatters fix; nothing else)."
run = "hk fix --all"

[tasks.check]
description = "All lint gates (fmt/clippy/deny/typos), check-only — same set the pre-commit hook runs."
run = "hk check --all"

[tasks.audit]
description = "cargo-deny advisories (network: fetches the RustSec DB; not part of the offline pre-commit gates)."
run = "cargo deny --manifest-path spike/Cargo.toml check advisories"
